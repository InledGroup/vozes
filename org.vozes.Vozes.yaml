app-id: org.vozes.Vozes
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: vozes
build-options:
  build-args:
    - --share=network
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --filesystem=home
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: portaudio
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/PortAudio/portaudio.git
        tag: v19.7.0

  - name: libevdev
    buildsystem: autotools
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/libevdev/libevdev.git
        tag: libevdev-1.13.1

  - name: whisper-cpp
    buildsystem: cmake-ninja
    config-opts:
      - -DWHISPER_BUILD_EXAMPLES=OFF
      - -DWHISPER_BUILD_TESTS=OFF
    sources:
      - type: git
        url: https://github.com/ggerganov/whisper.cpp.git
        tag: v1.5.4

  - name: vozes
    buildsystem: simple
    build-commands:
      # We point pip to the portaudio we just built in /app
      - export C_INCLUDE_PATH=/app/include:$C_INCLUDE_PATH
      - export LIBRARY_PATH=/app/lib:$LIBRARY_PATH
      - pip3 install --prefix=/app --ignore-installed -r requirements.txt
      - pip3 install --prefix=/app --ignore-installed openwakeword==0.6.0 --no-deps
      - install -D -m 755 vozes.sh /app/bin/vozes
      - mkdir -p /app/share/vozes
      - cp -r src /app/share/vozes/
      - mkdir -p /app/share/vozes/data
      - cp vozes.png /app/share/vozes/data/
      - install -D -m 644 data/org.vozes.Vozes.desktop /app/share/applications/org.vozes.Vozes.desktop
      - install -D -m 644 data/org.vozes.Vozes.png /app/share/icons/hicolor/512x512/apps/org.vozes.Vozes.png
      - install -D -m 644 data/org.vozes.Vozes.metainfo.xml /app/share/metainfo/org.vozes.Vozes.metainfo.xml
    sources:
      - type: dir
        path: .
      - type: script
        dest-filename: vozes.sh
        commands:
          - export PYTHONPATH=/app/share/vozes/src:/app/lib/python3.11/site-packages:$PYTHONPATH
          - export LD_LIBRARY_PATH=/app/lib:$LD_LIBRARY_PATH
          - exec python3 /app/share/vozes/src/main.py "$@"
