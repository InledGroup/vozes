# App info for Inled Group
app-id: org.vozes.Vozes
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: vozes
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --filesystem=home
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: whisper-cpp
    buildsystem: cmake-ninja
    config-opts:
      - -DWHISPER_BUILD_EXAMPLES=OFF
      - -DWHISPER_BUILD_TESTS=OFF
    sources:
      - type: git
        url: https://github.com/ggerganov/whisper.cpp.git
        tag: v1.5.4

  - name: python3-dependencies
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app -r requirements.txt
    sources:
      - type: file
        path: requirements.txt

  - name: vozes
    buildsystem: simple
    build-commands:
      - install -D -m 755 vozes.sh /app/bin/vozes
      - mkdir -p /app/share/vozes
      - cp -r src /app/share/vozes/
      - mkdir -p /app/share/vozes/data
      - cp vozes.png /app/share/vozes/data/
      - install -D -m 644 data/org.vozes.Vozes.desktop /app/share/applications/org.vozes.Vozes.desktop
      - install -D -m 644 vozes.png /app/share/icons/hicolor/scalable/apps/org.vozes.Vozes.png
      - install -D -m 644 data/org.vozes.Vozes.metainfo.xml /app/share/metainfo/org.vozes.Vozes.metainfo.xml
    sources:
      - type: dir
        path: .
      - type: script
        dest-filename: vozes.sh
        commands:
          - export PYTHONPATH=/app/share/vozes/src:/app/lib/python3.11/site-packages:$PYTHONPATH
          - exec python3 /app/share/vozes/src/main.py "$@"
