name: Build Debian Packages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build AMD64 Natively
        if: matrix.arch == 'amd64'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential cmake git dpkg-dev libsdl2-dev ca-certificates
          
          # Ensure bin directory exists and clone whisper.cpp
          mkdir -p bin
          rm -rf bin/whisper.cpp
          git clone --depth 1 --branch v1.8.2 https://github.com/ggerganov/whisper.cpp.git bin/whisper.cpp
          
          # Build whisper.cpp
          cd bin/whisper.cpp
          mkdir -p build && cd build
          cmake .. -DWHISPER_SDL2=OFF -DWHISPER_ALL_EXTRAS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          make -j$(nproc) whisper-cli
          cd ../../../
          
          # Build Debian package
          bash build_deb.sh

      - name: Build ARM64 with QEMU
        if: matrix.arch == 'arm64'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu_latest
          env: |
            ARCH: arm64
          install: |
            apt-get update -y
            apt-get install -y build-essential cmake git dpkg-dev libsdl2-dev ca-certificates
          run: |
            # Ensure bin directory exists and clone whisper.cpp
            mkdir -p bin
            rm -rf bin/whisper.cpp
            git clone --depth 1 --branch v1.8.2 https://github.com/ggerganov/whisper.cpp.git bin/whisper.cpp
            
            # Build whisper.cpp
            cd bin/whisper.cpp
            mkdir -p build && cd build
            cmake .. -DWHISPER_SDL2=OFF -DWHISPER_ALL_EXTRAS=OFF -DWHISPER_BUILD_EXAMPLES=ON
            make -j$(nproc) whisper-cli
            cd ../../../
            
            # Build Debian package
            bash build_deb.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vozes-${{ matrix.arch }}
          path: "*.deb"
